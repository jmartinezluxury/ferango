name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.0)'
        required: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary (Apple Silicon + Intel)
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            build_args: --target universal-apple-darwin

          # Linux (x86_64) — produces .deb and .AppImage
          - platform: ubuntu-22.04
            rust_targets: ''
            build_args: ''

          # Windows (x86_64) — produces .msi and NSIS .exe
          - platform: windows-latest
            rust_targets: ''
            build_args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + pnpm ───────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # ── Linux system dependencies ────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      # ── macOS: Import Apple Developer certificate ────────────────────────────
      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install

      # ── Build and publish release ────────────────────────────────────────────
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: pnpm exec tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Ferango ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            See the full commit history for details.

            ## Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon + Intel) | `.dmg` (signed + notarized) |
            | Windows | `.msi` or `.exe` |
            | Linux | `.AppImage` or `.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.build_args }}
