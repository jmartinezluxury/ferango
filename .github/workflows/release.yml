name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.0)'
        required: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary (Apple Silicon + Intel)
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            build_args: --target universal-apple-darwin

          # Linux (x86_64) — produces .deb and .AppImage
          - platform: ubuntu-22.04
            rust_targets: ''
            build_args: ''

          # Windows (x86_64) — produces .msi and NSIS .exe
          - platform: windows-latest
            rust_targets: ''
            build_args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js + pnpm ───────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # ── Linux system dependencies ────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install

      # ── Build and publish release ────────────────────────────────────────────
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing (optional — set these secrets to enable) ──────
          # APPLE_CERTIFICATE:          base64-encoded .p12 Developer ID certificate
          # APPLE_CERTIFICATE_PASSWORD: password for the .p12 file
          # APPLE_SIGNING_IDENTITY:     e.g. "Developer ID Application: Name (TEAMID)"
          # APPLE_ID:                   your Apple ID email (for notarization)
          # APPLE_PASSWORD:             app-specific password from appleid.apple.com
          # APPLE_TEAM_ID:              your 10-character Apple Team ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing (optional) ──────────────────────────────────
          # TAURI_SIGNING_PRIVATE_KEY:          base64-encoded signing key
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: password for the signing key
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'dbmongoR ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            See the full [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Windows | `.msi` or `.exe` |
            | Linux | `.AppImage` or `.deb` |

            > **macOS note:** If you see "unidentified developer", right-click the app and choose Open, or run `xattr -cr /Applications/dbmongoR.app`.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.build_args }}
